name: Run Puppeteer Node.js
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    # 👇 用这个镜像 = 自带 Chrome + 所有权限 + 所有依赖
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/puppeteer/puppeteer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install deps
        run: npm install

      # 不需要安装任何浏览器！镜像自带

      - name: Run script
        run: node main.js
