name: Run Node.js Puppeteer
on:
  workflow_dispatch:
   inputs:
      # 👇 这个 env_type 就是你问的！
      env_type:
        description: '运行环境'
        required: true
        default: aaa@bbb.com'
        type: choice
        options:
          - email

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      # 👇 安装 Chrome 必需的系统库（必须先装）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libx11-xcb1

      # 👇 关键：用 root 安装浏览器（解决权限！）
      - name: Install Chrome for Puppeteer
        run: sudo npm install -g puppeteer

      # 👇 直接运行
      
      - name: Run main.js
        run: node main.js "${{ inputs.env_type }}"
