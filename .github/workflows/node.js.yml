name: Run Node.js with Playwright

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      # 👇 这是 GitHub 官方支持 playwright 的唯一正确写法（解决权限！）
      - name: Install Playwright browsers
        uses: microsoft/playwright-github-action@v1

      # 👇 最后运行你的代码
      - name: Run main.js
        run: node main.js
